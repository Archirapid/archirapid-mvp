name: Keep Alive
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ArchiRapid
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://archirapid.streamlit.app
          curl -s -o /dev/null -w "%{http_code}" https://archirapid.com
